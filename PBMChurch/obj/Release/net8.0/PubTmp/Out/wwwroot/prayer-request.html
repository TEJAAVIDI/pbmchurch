<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PBM Church - Prayer Request</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h3><i class="fas fa-praying-hands me-2"></i>Prayer Request</h3>
                        <p class="mb-0">Submit your prayer request and we will pray for you</p>
                    </div>
                    <div class="card-body">
                        <form id="prayerRequestForm">
                            <div class="mb-3">
                                <label for="name" class="form-label">Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="name" name="name" required>
                            </div>

                            <div class="mb-3">
                                <label for="phone" class="form-label">Phone</label>
                                <input type="tel" class="form-control" id="phone" name="phone">
                            </div>

                            <div class="mb-3">
                                <label for="church" class="form-label">Church</label>
                                <select class="form-select" id="church" name="churchId">
                                    <option value="">No Church (General Request)</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="title" class="form-label">Prayer Request Title</label>
                                <input type="text" class="form-control" id="title" name="title" placeholder="Brief title for the prayer request...">
                            </div>

                            <div class="mb-3">
                                <label for="request" class="form-label">Prayer Request Details <span class="text-danger">*</span></label>
                                <textarea class="form-control" id="request" name="request" rows="4" placeholder="Enter the prayer request details..." required></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="notes" class="form-label">Additional Notes</label>
                                <textarea class="form-control" id="notes" name="notes" rows="2" placeholder="Any additional notes..."></textarea>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="fas fa-paper-plane me-2"></i>Submit Prayer Request
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Success/Error Messages -->
                <div id="alertContainer" class="mt-3"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Load churches on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadChurches();
        });

        function loadChurches() {
            fetch('/Public/GetChurches')
                .then(response => response.json())
                .then(churches => {
                    const churchSelect = document.getElementById('church');
                    churches.forEach(church => {
                        const option = document.createElement('option');
                        option.value = church.value;
                        option.textContent = church.text;
                        churchSelect.appendChild(option);
                    });
                })
                .catch(error => {
                    console.error('Error loading churches:', error);
                });
        }

        // Handle form submission
        document.getElementById('prayerRequestForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = {
                name: formData.get('name'),
                phone: formData.get('phone'),
                churchId: formData.get('churchId') || null,
                title: formData.get('title'),
                request: formData.get('request'),
                notes: formData.get('notes')
            };

            // Show loading state
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Submitting...';
            submitBtn.disabled = true;

            fetch('/Public/SubmitPrayerRequest', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: new URLSearchParams(data)
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    Swal.fire({
                        title: 'Prayer Request Submitted!',
                        html: `
                            <div class="text-center">
                                <i class="fas fa-check-circle text-success" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                                <p class="mb-3">Your prayer request has been submitted successfully. We will pray for you.</p>
                                <p class="mb-3"><strong>If you need immediate resolution, call:</strong></p>
                                <a href="tel:9154886214" class="btn btn-success btn-lg">
                                    <i class="fas fa-phone me-2"></i>9154886214
                                </a>
                            </div>
                        `,
                        showConfirmButton: true,
                        confirmButtonText: 'Close',
                        confirmButtonColor: '#28a745',
                        allowOutsideClick: false
                    });
                    this.reset(); // Clear form
                } else {
                    Swal.fire({
                        title: 'Error!',
                        text: result.message,
                        icon: 'error',
                        confirmButtonText: 'Try Again'
                    });
                }
            })
            .catch(error => {
                console.error('Error:', error);
                Swal.fire({
                    title: 'Network Error!',
                    text: 'Network error occurred. Please try again.',
                    icon: 'error',
                    confirmButtonText: 'Try Again'
                });
            })
            .finally(() => {
                // Restore button state
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
